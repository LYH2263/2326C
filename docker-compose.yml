services:
  db:
    image: mysql:8.0
    container_name: lab-animal-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: lab_animal_db
      MYSQL_USER: labuser
      MYSQL_PASSWORD: labpass123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - lab-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lab-animal-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: root123456
      DB_DATABASE: lab_animal_db
      NODE_ENV: production
      PORT: 8000
      TZ: Asia/Shanghai
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lab-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lab-animal-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - lab-network

volumes:
  mysql_data:
    driver: local

networks:
  lab-network:
    driver: bridge
